<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蚂蚁巢穴 - 蚁巢基地</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }

        /* 主容器 */
        .game-container { max-width: 900px; margin: 0 auto; padding: 20px; }

        /* 标题 */
        h1 { text-align: center; color: #e94560; margin-bottom: 20px; }

        /* 导航按钮 */
        .nav-bar { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .nav-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav-btn.active { background: #e94560; color: white; }
        .nav-btn.inactive { background: #333; color: #888; }
        .nav-btn:hover { transform: scale(1.05); }

        /* 蚁巢区域 */
        .anthill-section {
            background: #16213e;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section-title {
            color: #e94560;
            margin-bottom: 15px;
            font-size: 18px;
            border-left: 4px solid #e94560;
            padding-left: 10px;
        }

        /* 蚁巢俯视图 */
        .anthill-view {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 250px;
            background: radial-gradient(circle, #2d1f3d 0%, #1a1a2e 70%);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }

        .anthill-icon {
            width: 120px;
            height: 120px;
            background: radial-gradient(ellipse, #8b5a2b 0%, #5c3d1e 50%, #3d2814 100%);
            border-radius: 50% 50% 45% 45%;
            position: relative;
            box-shadow: 0 0 30px rgba(139, 90, 43, 0.5);
        }

        .anthill-icon::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 40%;
            background: #1a1a2e;
            border-radius: 50%;
        }

        .anthill-icon::after {
            content: '';
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 20px;
            background: #1a1a2e;
            border-radius: 0 0 50% 50%;
        }

        /* 蚂蚁动画 */
        .ant {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #333;
            border-radius: 50%;
            animation: wander 4s infinite ease-in-out;
        }

        @keyframes wander {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(20px, -15px); }
            50% { transform: translate(-10px, -25px); }
            75% { transform: translate(15px, -10px); }
        }

        /* 生产和资源区域 */
        .bottom-panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* 生产队列 */
        .production-panel {
            background: #16213e;
            border-radius: 16px;
            padding: 20px;
        }

        .queue-list { display: flex; flex-direction: column; gap: 10px; }

        .queue-item {
            background: #1f2b47;
            border-radius: 10px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .ant-icon {
            width: 40px;
            height: 40px;
            background: #e94560;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .ant-icon.worker { background: #4ecdc4; }
        .ant-icon.soldier { background: #e94560; }
        .ant-icon.queen { background: #ffd93d; }

        .queue-info { flex: 1; }
        .queue-name { font-size: 14px; margin-bottom: 4px; }
        .queue-time { font-size: 12px; color: #888; }

        .progress-bar {
            width: 80px;
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            border-radius: 3px;
            transition: width 0.5s;
        }

        /* 生产按钮 */
        .produce-btns { display: flex; gap: 8px; margin-top: 15px; }
        .produce-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .produce-btn.worker { background: #4ecdc4; color: #000; }
        .produce-btn.soldier { background: #e94560; color: #fff; }
        .produce-btn.queen { background: #ffd93d; color: #000; }
        .produce-btn:hover { transform: scale(1.02); opacity: 0.9; }
        .produce-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* 资源面板 */
        .resources-panel {
            background: #16213e;
            border-radius: 16px;
            padding: 20px;
        }

        .resource-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .resource-item {
            background: #1f2b47;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }

        .resource-icon { font-size: 28px; margin-bottom: 8px; }
        .resource-name { font-size: 12px; color: #888; margin-bottom: 4px; }
        .resource-value { font-size: 20px; font-weight: bold; color: #ffd93d; }

        /* 入局按钮 */
        .enter-battle-container { text-align: center; margin-top: 20px; }
        .enter-battle-btn {
            padding: 18px 60px;
            font-size: 20px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(233, 69, 96, 0.4);
        }
        .enter-battle-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 30px rgba(233, 69, 96, 0.6);
        }

        /* 战斗场景 */
        .battle-view { display: none; }
        .battle-view.active { display: block; }
        .base-view { display: block; }
        .base-view.hidden { display: none; }

        /* 战斗界面 */
        .battle-scene {
            background: #0f0f23;
            border-radius: 16px;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .player-ant {
            width: 50px;
            height: 50px;
            background: #4ecdc4;
            border-radius: 50%;
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.5);
        }

        .enemy-beetle {
            width: 60px;
            height: 60px;
            background: #e94560;
            border-radius: 30%;
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .back-to-base {
            margin-top: 20px;
            text-align: center;
        }
        .back-btn {
            padding: 12px 30px;
            background: #333;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
        }
        .back-btn:hover { background: #444; }

        /* 统计信息 */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: #16213e;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        .stat-item { text-align: center; }
        .stat-label { font-size: 12px; color: #888; }
        .stat-value { font-size: 18px; font-weight: bold; color: #4ecdc4; }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐜 蚂蚁巢穴</h1>

        <!-- 导航栏 -->
        <div class="nav-bar">
            <button class="nav-btn active" onclick="switchView('base')">蚁巢基地</button>
            <button class="nav-btn inactive" onclick="switchView('battle')">战场</button>
        </div>

        <!-- 基地视图 -->
        <div id="baseView" class="base-view">
            <!-- 统计条 -->
            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-label">工蚁数量</div>
                    <div class="stat-value" id="workerCount">5</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">兵蚁数量</div>
                    <div class="stat-value" id="soldierCount">3</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">蚁后数量</div>
                    <div class="stat-value" id="queenCount">1</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">总蚁数</div>
                    <div class="stat-value" id="totalCount">9</div>
                </div>
            </div>

            <!-- 蚁巢俯视图 -->
            <div class="anthill-section">
                <div class="section-title">蚁巢俯视图</div>
                <div class="anthill-view">
                    <div class="anthill-icon"></div>
                    <div class="ant" style="top: 30%; left: 25%; animation-delay: 0s;"></div>
                    <div class="ant" style="top: 60%; left: 70%; animation-delay: 1s;"></div>
                    <div class="ant" style="top: 40%; left: 80%; animation-delay: 2s;"></div>
                    <div class="ant" style="top: 70%; left: 20%; animation-delay: 0.5s;"></div>
                    <div class="ant" style="top: 20%; left: 60%; animation-delay: 1.5s;"></div>
                </div>
            </div>

            <!-- 生产和资源 -->
            <div class="bottom-panels">
                <!-- 生产队列 -->
                <div class="production-panel">
                    <div class="section-title">蚂蚁生产队列</div>
                    <div class="queue-list" id="productionQueue">
                        <div class="queue-item">
                            <div class="ant-icon worker">工</div>
                            <div class="queue-info">
                                <div class="queue-name">工蚁</div>
                                <div class="queue-time">剩余 5秒</div>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: 70%;"></div>
                            </div>
                        </div>
                    </div>
                    <div class="produce-btns">
                        <button class="produce-btn worker" onclick="addToQueue('worker')">生产工蚁</button>
                        <button class="produce-btn soldier" onclick="addToQueue('soldier')">生产兵蚁</button>
                        <button class="produce-btn queen" onclick="addToQueue('queen')" id="queenBtn">生产蚁后</button>
                    </div>
                </div>

                <!-- 资源存储 -->
                <div class="resources-panel">
                    <div class="section-title">物资存储</div>
                    <div class="resource-grid">
                        <div class="resource-item">
                            <div class="resource-icon">🍖</div>
                            <div class="resource-name">食物</div>
                            <div class="resource-value" id="food">120</div>
                        </div>
                        <div class="resource-item">
                            <div class="resource-icon">🪨</div>
                            <div class="resource-name">木材</div>
                            <div class="resource-value" id="wood">85</div>
                        </div>
                        <div class="resource-item">
                            <div class="resource-icon">💎</div>
                            <div class="resource-name">晶体</div>
                            <div class="resource-value" id="crystal">30</div>
                        </div>
                        <div class="resource-item">
                            <div class="resource-icon">⚔️</div>
                            <div class="resource-name">装备</div>
                            <div class="resource-value" id="equipment">5</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 入局按钮 -->
            <div class="enter-battle-container">
                <button class="enter-battle-btn" onclick="startBattle()">🚀 进入战场</button>
            </div>
        </div>

        <!-- 战斗视图 -->
        <div id="battleView" class="battle-view">
            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-label">生命值</div>
                    <div class="stat-value" style="color: #4ecdc4;">100/100</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">攻击力</div>
                    <div class="stat-value" style="color: #e94560;">25</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">波次</div>
                    <div class="stat-value">1</div>
                </div>
            </div>

            <div class="battle-scene" id="battleScene">
                <div class="player-ant" id="playerAnt">🐜</div>
                <div class="enemy-beetle" style="top: 20%; left: 60%;">🪲</div>
                <div class="enemy-beetle" style="top: 60%; left: 70%;">🪲</div>
            </div>

            <div class="back-to-base">
                <button class="back-btn" onclick="switchView('base')">← 返回基地</button>
            </div>
        </div>
    </div>

    <script>
        // 游戏数据
        let gameData = {
            resources: { food: 120, wood: 85, crystal: 30, equipment: 5 },
            ants: { worker: 5, soldier: 3, queen: 1 },
            productionQueue: [],
            currentView: 'base'
        };

        // 生产成本配置
        const productionCost = {
            worker: { food: 20, time: 8 },
            soldier: { food: 40, time: 15 },
            queen: { food: 100, time: 30 }
        };

        // 切换视图
        function switchView(view) {
            const baseView = document.getElementById('baseView');
            const battleView = document.getElementById('battleView');
            const navBtns = document.querySelectorAll('.nav-btn');

            if (view === 'base') {
                baseView.classList.remove('hidden');
                battleView.classList.remove('active');
                navBtns[0].classList.add('active');
                navBtns[0].classList.remove('inactive');
                navBtns[1].classList.add('inactive');
                navBtns[1].classList.remove('active');
            } else {
                baseView.classList.add('hidden');
                battleView.classList.add('active');
                navBtns[1].classList.add('active');
                navBtns[1].classList.remove('inactive');
                navBtns[0].classList.add('inactive');
                navBtns[0].classList.remove('active');
            }
            gameData.currentView = view;
        }

        // 添加到生产队列
        function addToQueue(type) {
            const cost = productionCost[type];

            // 检查资源是否足够
            if (gameData.resources.food < cost.food) {
                alert('食物不足！需要 ' + cost.food + ' 食物');
                return;
            }

            // 限制队列长度
            if (gameData.productionQueue.length >= 5) {
                alert('生产队列已满');
                return;
            }

            // 限制蚁后数量
            if (type === 'queen' && gameData.ants.queen >= 2) {
                alert('蚁后数量已达上限');
                return;
            }

            // 消耗资源
            gameData.resources.food -= cost.food;
            updateResourceDisplay();

            // 添加到队列
            gameData.productionQueue.push({
                type: type,
                remainingTime: cost.time,
                totalTime: cost.time
            });

            renderProductionQueue();
        }

        // 渲染生产队列
        function renderProductionQueue() {
            const queueList = document.getElementById('productionQueue');

            if (gameData.productionQueue.length === 0) {
                queueList.innerHTML = '<div style="color: #666; text-align: center; padding: 20px;">队列空闲</div>';
                return;
            }

            queueList.innerHTML = gameData.productionQueue.map((item, index) => {
                const progress = ((item.totalTime - item.remainingTime) / item.totalTime) * 100;
                const icons = { worker: '工', soldier: '兵', queen: '后' };
                return `
                    <div class="queue-item">
                        <div class="ant-icon ${item.type}">${icons[item.type]}</div>
                        <div class="queue-info">
                            <div class="queue-name">${item.type === 'worker' ? '工蚁' : item.type === 'soldier' ? '兵蚁' : '蚁后'}</div>
                            <div class="queue-time">剩余 ${Math.ceil(item.remainingTime)}秒</div>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progress}%;"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 更新资源显示
        function updateResourceDisplay() {
            document.getElementById('food').textContent = gameData.resources.food;
            document.getElementById('wood').textContent = gameData.resources.wood;
            document.getElementById('crystal').textContent = gameData.resources.crystal;
            document.getElementById('equipment').textContent = gameData.resources.equipment;
        }

        // 更新蚂蚁数量显示
        function updateAntCountDisplay() {
            document.getElementById('workerCount').textContent = gameData.ants.worker;
            document.getElementById('soldierCount').textContent = gameData.ants.soldier;
            document.getElementById('queenCount').textContent = gameData.ants.queen;
            document.getElementById('totalCount').textContent =
                gameData.ants.worker + gameData.ants.soldier + gameData.ants.queen;

            // 更新蚁后按钮状态
            document.getElementById('queenBtn').disabled = gameData.ants.queen >= 2;
        }

        // 开始战斗
        function startBattle() {
            if (gameData.ants.soldier < 1) {
                alert('需要至少1只兵蚁才能进入战场！');
                return;
            }
            switchView('battle');
        }

        // 生产Tick - 每秒更新
        function productionTick() {
            if (gameData.productionQueue.length === 0) return;

            // 减少第一个项目的时间
            gameData.productionQueue[0].remainingTime -= 1;

            // 完成生产
            if (gameData.productionQueue[0].remainingTime <= 0) {
                const completed = gameData.productionQueue.shift();
                gameData.ants[completed.type]++;
                updateAntCountDisplay();
            }

            renderProductionQueue();
        }

        // 战场玩家移动
        document.addEventListener('keydown', function(e) {
            if (gameData.currentView !== 'battle') return;

            const player = document.getElementById('playerAnt');
            const step = 20;
            let top = parseInt(player.style.top) || 50;
            let left = parseInt(player.style.left) || 50;

            switch(e.key.toLowerCase()) {
                case 'w': case 'arrowup': top -= step; break;
                case 's': case 'arrowdown': top += step; break;
                case 'a': case 'arrowleft': left -= step; break;
                case 'd': case 'arrowright': left += step; break;
            }

            player.style.top = Math.max(0, Math.min(350, top)) + 'px';
            player.style.left = Math.max(0, Math.min(800, left)) + 'px';
        });

        // 初始化
        updateResourceDisplay();
        updateAntCountDisplay();
        renderProductionQueue();

        // 启动生产定时器
        setInterval(productionTick, 1000);
    </script>
</body>
</html>
